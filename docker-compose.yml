version: "3.9"

services:
  api:
    build: ./backend
    container_name: fitops-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build: ./frontend
    container_name: fitops-dashboard
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy